<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produção CNC</title>
<link rel="stylesheet" href="./producao.css">
</head>

<body>

<div class="container">

  <div class="top">
    <h1>Dashboard de Produção CNC</h1>
    <p>Turno Atual: Noite</p>
  </div>

  <div class="grid">

    <div class="card">
      <h3>Peças Produzidas</h3>
      <p>12.480</p>
    </div>

    <div class="card">
      <h3>Eficiência</h3>
      <p>94%</p>
    </div>

    <div class="card">
      <h3>Tornos Ativos</h3>
      <p>08</p>
    </div>

    <div class="card">
      <h3>Tempo Médio</h3>
      <p>21s</p>
    </div>

  </div>

  <div class="production">

    <h2>Meta de Produção</h2>

    <div class="line">
      <div class="progress" style="width:94%"></div>
    </div>

    <br>

    <p>94% da meta diária concluída</p>

  </div>

  <div class="machines">

    <h2>Status das Máquinas</h2>

    <br>

    <div class="machine">

      <div class="machine-top">
        <h3>Torno CNC 01</h3>
        <span class="status">Operando</span>
      </div>

      <div class="line">
        <div class="progress" style="width:92%"></div>
      </div>

    </div>

    <div class="machine">

      <div class="machine-top">
        <h3>Torno CNC 02</h3>
        <span class="status">Operando</span>
      </div>

      <div class="line">
        <div class="progress" style="width:76%"></div>
      </div>

    </div>

    <div class="machine">

      <div class="machine-top">
        <h3>Torno CNC 03</h3>
        <span class="status">Operando</span>
      </div>

      <div class="line">
        <div class="progress" style="width:88%"></div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
